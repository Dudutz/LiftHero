<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LiftHero</title>
  <desc id="desc">Imagem de compartilhamento do LiftHero com emblema heroico e mensagem de evolução de força.</desc>
  <rect width="1200" height="630" fill="#101014"/>
  <circle cx="260" cy="170" r="260" fill="#00D9FF" opacity="0.16"/>
  <circle cx="980" cy="520" r="250" fill="#F59E0B" opacity="0.14"/>
  <g transform="translate(110 115)">
    <rect x="0" y="0" width="980" height="400" rx="36" fill="#1A1B22" stroke="#00D9FF" stroke-opacity="0.45" stroke-width="4"/>
    <circle cx="170" cy="200" r="92" fill="#00D9FF" opacity="0.14" stroke="#00D9FF" stroke-width="6"/>
    <text x="170" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="70" font-weight="900" fill="#F5F5F7">LH</text>
    <text x="310" y="170" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#F5F5F7">LiftHero</text>
    <text x="315" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#00D9FF">Evolua sua força</text>
    <text x="315" y="286" font-family="Arial, sans-serif" font-size="28" fill="#A8ADBB">Registre cargas, bata PRs e desbloqueie conquistas.</text>
  </g>
</svg>
